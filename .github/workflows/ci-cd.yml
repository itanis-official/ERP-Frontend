name: Frontend DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # === ÉTAPE 1 — Qualité du code ===
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ESLint → analyse statique du code ✅
      - name: Lint code (ESLint)
        run: npm run lint

      # TypeScript → vérifie les types ✅
      - name: Type check
        run: npx tsc --noEmit

  # === ÉTAPE 2 — Analyse SonarCloud ===
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # === ÉTAPE 3 — Build, Scan et Push ===
  build-scan-push:
    name: Build Scan and Push
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # login Docker Hub avec secrets ✅
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build une seule fois localement ✅
      # tag = Git SHA → unique et traçable ✅
      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.prod \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      # Trivy filesystem → vulnérabilités npm ✅
      # exit-code: 1 → fait échouer si CRITICAL/HIGH ✅
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # Trivy image → CVE dans l'image finale ✅
      # exit-code: 1 → fait échouer si CRITICAL/HIGH ✅
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # push uniquement si tous les scans passent ✅
      # if: success() → garantie supplémentaire ✅
      - name: Push Docker Image
        if: success()
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
